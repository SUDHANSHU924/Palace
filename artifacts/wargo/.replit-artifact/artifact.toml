kind = "web"
previewPath = "/"
title = "WARGO Industries"
version = "1.0.0"
id = "artifacts/wargo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19541

[services.development]
run = "pnpm --filter @workspace/wargo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wargo", "run", "build" ]
publicDir = "artifacts/wargo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19541"
BASE_PATH = "/"

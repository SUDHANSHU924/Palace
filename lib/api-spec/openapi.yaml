openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: WARGO Industries Restaurant API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: reservations
    description: Table reservation operations
  - name: availability
    description: Availability check operations
  - name: menu
    description: Menu operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /reserve-table:
    post:
      operationId: reserveTable
      tags: [reservations]
      summary: Create a table reservation
      description: >
        Checks availability, appends to Google Sheet, updates availability,
        sends confirmation email to customer, and notification to manager.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReservationInput"
      responses:
        "200":
          description: Reservation confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationConfirmation"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: No availability for the requested slot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /availability:
    get:
      operationId: getAvailability
      tags: [availability]
      summary: Get available time slots for a date
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            description: Date in YYYY-MM-DD format
      responses:
        "200":
          description: Available slots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimeSlot"
        "400":
          description: Invalid date
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /menu:
    get:
      operationId: getMenu
      tags: [menu]
      summary: Get full menu
      responses:
        "200":
          description: Menu items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ReservationInput:
      type: object
      required:
        - name
        - phone
        - email
        - date
        - time
        - guests
      properties:
        name:
          type: string
          minLength: 2
        phone:
          type: string
          minLength: 7
        email:
          type: string
          format: email
        date:
          type: string
          description: Date in YYYY-MM-DD format
        time:
          type: string
          description: Time slot e.g. "7:00 PM"
        guests:
          type: integer
          minimum: 1
          maximum: 20
        specialRequests:
          type: ["string", "null"]
        occasion:
          type: ["string", "null"]
          description: e.g. Birthday, Anniversary

    ReservationConfirmation:
      type: object
      required:
        - bookingId
        - name
        - date
        - time
        - guests
        - status
      properties:
        bookingId:
          type: string
        name:
          type: string
        email:
          type: string
        date:
          type: string
        time:
          type: string
        guests:
          type: integer
        status:
          type: string
          enum: [confirmed]
        message:
          type: string

    TimeSlot:
      type: object
      required:
        - time
        - availableSeats
        - available
      properties:
        time:
          type: string
        availableSeats:
          type: integer
        available:
          type: boolean

    MenuSection:
      type: object
      required:
        - category
        - items
      properties:
        category:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/MenuItem"

    MenuItem:
      type: object
      required:
        - id
        - name
        - description
        - price
        - category
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        price:
          type: number
        category:
          type: string
          enum: [appetizers, mains, desserts, drinks]
        image:
          type: ["string", "null"]
        tags:
          type: array
          items:
            type: string
          description: e.g. vegetarian, vegan, gluten-free
        calories:
          type: ["integer", "null"]
        allergens:
          type: ["string", "null"]

    MenuResponse:
      type: object
      required:
        - sections
      properties:
        sections:
          type: array
          items:
            $ref: "#/components/schemas/MenuSection"

    ApiError:
      type: object
      required:
        - error
      properties:
        error:
          type: string
